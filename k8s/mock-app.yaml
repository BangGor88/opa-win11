apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-catalog
  template:
    metadata:
      labels:
        app: mock-catalog
    spec:
      containers:
      - name: mock-catalog
        image: mock-catalog:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: OPA_URL
          value: "http://opa:8181"
---
apiVersion: v1
kind: Service
metadata:
  name: mock-catalog
spec:
  type: NodePort
  selector:
    app: mock-catalog
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30080