apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: opa-authz-om
  namespace: openmetadata
plugin: pre-function
config:
  access:
  - |
    local role = kong.request.get_header("X-User-Role") or "viewer"
    local path = kong.request.get_path()
    local method = kong.request.get_method()

    local action_map = {GET="read", POST="write", PUT="write", PATCH="write", DELETE="delete"}
    local action = action_map[method] or "read"

    local resource = path:match("/api/v1/(.+)") or path

    local http = require "resty.http"
    local httpc = http.new()

    local res, err = httpc:request_uri(
      "http://opa.default.svc.cluster.local:8181/v1/data/openmetadata/authz/allow",
      {
        method = "POST",
        body = string.format(
          '{"input":{"user":{"role":"%s"},"action":"%s","resource":"%s"}}',
          role, action, resource
        ),
        headers = { ["Content-Type"] = "application/json" }
      }
    )

    if err or not res then
      return kong.response.exit(403, { message = "OPA unreachable: " .. (err or "no response") })
    end

    local cjson = require "cjson"
    local body = cjson.decode(res.body)

    if not body.result then
      return kong.response.exit(403, {
        message = "OPA denied: role=" .. role .. " action=" .. action .. " resource=" .. resource
      })
    end